name: Daily ArXiv Update

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (对应北京时间 08:00)
    - cron: '0 0 * * *'
  push:
    branches:
      - main  # 当你推送代码到 main 分支时自动触发
    paths-ignore:
      - 'docs/posts/*.md' # 忽略日报文件变动，防止无限循环
  workflow_dispatch: # 允许手动点按钮触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取全量 commit 以便推送

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ArXiv Scraper
        # 仅在定时触发或手动触发时运行爬虫，推送时不运行（节省 API 额度且防止冲突）
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python scripts/main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # 如果有改动（例如生成的日报或你修改的配置），则提交
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: content/config changed [skip ci]"
            git push origin main
          fi

      - name: Deploy to GitHub Pages
        # 只要能运行到这一步，就执行部署（确保主题修改能立即上线）
        run: |
          mkdocs gh-deploy --force
